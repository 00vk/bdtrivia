<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BdTrivia</title>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
<script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>
<link rel="stylesheet" href="css/styles.css">
<script type="importmap">
{
  "imports": {
    "@huggingface/transformers": "https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.1/dist/transformers.esm.js"
  }
}
</script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
</head>
<body>
<div id="app">

  <button id="lang-toggle" style="position:absolute;top:8px;right:8px;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:#fff;border-radius:6px;padding:4px 10px;font-size:0.85em;cursor:pointer;z-index:10;" data-i18n="lang.toggle"></button>

  <!-- Host: enter nickname -->
  <div id="screen-host-nickname" class="screen active">
    <h1>BdTrivia</h1>
    <p data-i18n="start.subtitle"></p>
    <input type="text" id="host-nickname-input" data-i18n="host.nickname" maxlength="20" autocomplete="off">
    <button class="btn btn-primary" id="host-create-btn" data-i18n="host.createBtn"></button>
    <div id="host-create-error" class="error hidden"></div>
  </div>

  <!-- Host: lobby -->
  <div id="screen-lobby-host" class="screen">
    <h2 data-i18n="host.lobby.title"></h2>
    <div class="room-code" id="room-code-display">----</div>
    <div class="lobby-qr" id="lobby-qr"></div>
    <p><span data-i18n="host.enterOnPhone"></span> <button class="copy-btn" id="copy-code-btn" data-i18n="host.copyBtn"></button></p>
    <div id="player-list"><p class="waiting" data-i18n="host.waitingPlayers"></p></div>
    <button class="btn btn-primary" id="host-start-btn" style="margin-top:8px" disabled data-i18n="host.startBtn"></button>
    <button class="btn btn-secondary" id="host-edit-btn" style="margin-top:4px;" data-i18n="host.editBtn"></button>
    <div id="host-start-error" class="error hidden"></div>
  </div>

  <!-- Host: question editor -->
  <div id="screen-editor" class="screen screen-scroll">
    <div class="editor-header">
      <h2 data-i18n="editor.title"></h2>
      <div class="editor-add-row">
        <button class="editor-btn-sm" id="editor-add-choice" data-i18n="editor.addChoice"></button>
        <button class="editor-btn-sm" id="editor-add-text" data-i18n="editor.addText"></button>
        <button class="editor-btn-sm" id="editor-add-slide" data-i18n="editor.addSlide"></button>
      </div>
    </div>
    <div id="editor-list"></div>
    <div class="editor-footer">
      <div id="editor-error" class="error hidden"></div>
      <button class="btn btn-secondary" id="editor-back-btn" style="margin-top:8px;" data-i18n="host.backLobby"></button>
    </div>
  </div>

  <!-- Host: game in progress -->
  <div id="screen-game-host" class="screen">
    <div class="round-label" id="game-host-round"></div>
    <div class="progress-label" id="game-host-progress"></div>
    <div class="question-text" id="game-host-question"></div>
    <div class="media-container" id="game-host-media"></div>
    <div id="game-host-options"></div>
    <div class="game-bar">
      <span class="game-timer" id="game-host-timer">⏱ --:--</span>
      <span class="game-answered" id="game-host-answered"></span>
    </div>
  </div>

  <!-- Player: game in progress -->
  <div id="screen-game-player" class="screen">
    <div class="round-label" id="game-player-round"></div>
    <div class="progress-label" id="game-player-progress"></div>
    <div class="question-text" id="game-player-question"></div>
    <div class="media-container" id="game-player-media"></div>
    <div id="game-player-options"></div>
    <span class="game-timer" id="game-player-timer">⏱ --:--</span>
  </div>

  <!-- Player: enter room code -->
  <div id="screen-player-roomcode" class="screen">
    <h2 data-i18n="join.title"></h2>
    <input type="text" id="player-code-input" data-i18n="join.roomCode" maxlength="6" autocomplete="off">
    <button class="btn btn-primary" id="player-join-code-btn" data-i18n="join.nextBtn"></button>
    <div id="player-code-error" class="error hidden"></div>
  </div>

  <!-- Player: enter nickname -->
  <div id="screen-player-nickname" class="screen">
    <h2 data-i18n="join.yourName"></h2>
    <input type="text" id="player-nickname-input" data-i18n="join.nicknameInput" maxlength="20" autocomplete="off">
    <button class="btn btn-primary" id="player-join-btn" data-i18n="join.joinBtn"></button>
    <div id="player-join-error" class="error hidden"></div>
  </div>

  <!-- Player: lobby -->
  <div id="screen-lobby-player" class="screen">
    <h2 data-i18n="player.lobby.title"></h2>
    <p data-i18n="player.lobby.waiting"></p>
    <div class="waiting" style="font-size:2em;margin-top:16px;">⏳</div>
  </div>

</div>

<script type="module" src="js/main.js"></script>
</body>
</html>

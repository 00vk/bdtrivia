<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BdTrivia</title>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: #fff;
  display: flex; align-items: center; justify-content: center;
}
#app { width: 100%; max-width: 480px; height: 100vh; max-height: 800px; padding: 24px; }
.screen { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; gap: 16px; }
.screen.active { display: flex; }
h1 { font-size: 2.2em; font-weight: 800; letter-spacing: -0.02em; }
h2 { font-size: 1.4em; font-weight: 600; }
p { font-size: 0.95em; opacity: 0.85; line-height: 1.4; }
input[type="text"] {
  width: 100%; max-width: 320px; padding: 14px 18px; border: none; border-radius: 12px;
  font-size: 1.1em; text-align: center; background: rgba(255,255,255,0.15); color: #fff;
  outline: 2px solid transparent; transition: outline 0.2s;
}
input[type="text"]::placeholder { color: rgba(255,255,255,0.5); }
input[type="text"]:focus { outline-color: rgba(255,255,255,0.6); }
.btn {
  padding: 14px 36px; border: none; border-radius: 12px; font-size: 1.1em; font-weight: 700;
  cursor: pointer; transition: transform 0.15s, opacity 0.15s; min-width: 200px;
}
.btn:active { transform: scale(0.96); }
.btn-primary { background: #fff; color: #667eea; }
.btn-secondary { background: rgba(255,255,255,0.18); color: #fff; }
.room-code {
  font-size: 3em; font-weight: 800; letter-spacing: 0.15em;
  background: rgba(255,255,255,0.12); padding: 16px 32px; border-radius: 16px;
  font-family: 'Courier New', monospace; user-select: all;
}
#player-list { width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 8px; margin: 8px 0; }
.player-chip {
  background: rgba(255,255,255,0.1); padding: 10px 16px; border-radius: 10px;
  font-size: 1em; display: flex; align-items: center; gap: 10px;
}
.player-chip::before { content: '👤'; font-size: 1.2em; }
.waiting { font-size: 0.9em; opacity: 0.6; margin-top: 8px; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100% { opacity: 0.6; } 50% { opacity: 0.3; } }
.error { color: #ffb3b3; font-size: 0.9em; background: rgba(255,0,0,0.1); padding: 8px 16px; border-radius: 8px; width: 100%; max-width: 320px; }
.hidden { display: none; }
#game-host-options, #game-player-options { width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 10px; }
.opt-btn {
  width: 100%; padding: 16px 20px; border: 2px solid rgba(255,255,255,0.25); border-radius: 12px;
  background: rgba(255,255,255,0.08); color: #fff; font-size: 1.1em; font-weight: 600;
  cursor: pointer; transition: background 0.15s, border-color 0.15s, transform 0.1s;
  text-align: left;
}
.opt-btn:hover, .opt-btn:focus-visible { background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.5); }
.opt-btn:active { transform: scale(0.97); }
.opt-btn.selected { background: rgba(255,255,255,0.25); border-color: #fff; }
.opt-btn:disabled { opacity: 0.5; cursor: default; transform: none; }
.game-bar { display: flex; justify-content: space-between; width: 100%; max-width: 320px; font-size: 0.9em; margin-top: 8px; }
.game-timer { font-weight: 700; font-variant-numeric: tabular-nums; }
.game-answered { opacity: 0.8; }
.media-container { width: 100%; max-width: 320px; margin: 8px 0; }
.media-container iframe { width: 100%; aspect-ratio: 16/9; border-radius: 12px; border: none; }
.media-container img { width: 100%; border-radius: 12px; max-height: 200px; object-fit: cover; }
.media-container audio { width: 100%; }
.round-label { font-size: 0.85em; opacity: 0.7; }
.progress-label { font-size: 0.9em; font-weight: 600; }
.question-text { font-size: 1.25em; font-weight: 700; margin: 12px 0; line-height: 1.4; }
.text-answer-area { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 320px; }
.reveal-header { font-weight: 700; font-size: 1.05em; margin: 10px 0 6px; width: 100%; max-width: 320px; text-align: left; }
.reveal-row { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 320px; padding: 10px 14px; border-radius: 10px; margin: 3px 0; font-size: 0.95em; }
.reveal-row.correct { background: rgba(76,175,80,0.18); border: 1px solid rgba(76,175,80,0.35); }
.reveal-row.wrong { background: rgba(244,67,54,0.18); border: 1px solid rgba(244,67,54,0.35); }
.reveal-dist-bar { width: 100%; max-width: 320px; margin: 2px 0; display: flex; align-items: center; gap: 8px; font-size: 0.9em; }
.reveal-dist-fill { height: 22px; border-radius: 6px; min-width: 4px; transition: width 0.4s; flex-shrink: 0; }
.reveal-dist-fill.correct { background: #4caf50; }
.reveal-dist-fill.wrong { background: rgba(255,255,255,0.25); }
.reveal-dist-label { min-width: 60px; text-align: right; flex-shrink: 0; }
.reveal-top3 { width: 100%; max-width: 320px; text-align: left; }
.reveal-top3-item { display: flex; justify-content: space-between; padding: 6px 10px; border-radius: 8px; margin: 2px 0; background: rgba(255,255,255,0.06); font-size: 0.95em; }
.podium { display: flex; justify-content: center; align-items: flex-end; gap: 8px; width: 100%; max-width: 320px; margin: 12px 0; }
.podium-item { display: flex; flex-direction: column; align-items: center; gap: 4px; border-radius: 12px 12px 0 0; padding: 12px 16px 8px; min-width: 80px; }
.podium-1 { background: rgba(255,215,0,0.25); font-size: 1.4em; padding-top: 20px; }
.podium-2 { background: rgba(192,192,192,0.2); font-size: 1.15em; padding-top: 14px; }
.podium-3 { background: rgba(205,127,50,0.2); font-size: 1em; padding-top: 10px; }
.podium-medal { font-size: 1.5em; }
.podium-name { font-weight: 700; text-align: center; }
.podium-score { font-size: 0.85em; opacity: 0.8; }
.rank-table { width: 100%; max-width: 320px; margin: 8px 0; }
.rank-row { display: flex; justify-content: space-between; padding: 8px 12px; border-radius: 8px; margin: 2px 0; background: rgba(255,255,255,0.06); font-size: 0.95em; }
.rank-row.top1 { background: rgba(255,215,0,0.12); }
.rank-row.top2 { background: rgba(192,192,192,0.1); }
.rank-row.top3 { background: rgba(205,127,50,0.1); }
.rank-pos { min-width: 28px; opacity: 0.7; }
.rank-name { flex: 1; text-align: left; margin-left: 8px; }
.rank-score { font-weight: 600; }
#editor-list { width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 6px; margin: 4px 0; max-height: 55vh; overflow-y: auto; }
.editor-card { background: rgba(255,255,255,0.08); border-radius: 12px; overflow: hidden; }
.editor-card-summary { display: flex; align-items: center; gap: 8px; padding: 10px 12px; cursor: pointer; user-select: none; }
.editor-card-summary:hover { background: rgba(255,255,255,0.05); }
.editor-card-icon { font-size: 1.2em; width: 28px; text-align: center; flex-shrink: 0; }
.editor-card-preview { flex: 1; text-align: left; font-size: 0.9em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.editor-card-actions { display: flex; gap: 4px; flex-shrink: 0; }
.editor-card-actions button { background: none; border: 1px solid rgba(255,255,255,0.2); color: #fff; border-radius: 6px; padding: 2px 6px; font-size: 0.8em; cursor: pointer; }
.editor-card-actions button:hover { background: rgba(255,255,255,0.15); }
.editor-card-form { display: none; flex-direction: column; gap: 8px; padding: 8px 12px 12px; border-top: 1px solid rgba(255,255,255,0.1); }
.editor-card-form.open { display: flex; }
.editor-card-form label { font-size: 0.85em; opacity: 0.8; text-align: left; }
.editor-card-form input, .editor-card-form textarea, .editor-card-form select { width: 100%; padding: 10px 12px; border: none; border-radius: 8px; font-size: 0.95em; background: rgba(255,255,255,0.12); color: #fff; font-family: inherit; }
.editor-card-form textarea { resize: vertical; min-height: 50px; }
.editor-card-form input::placeholder, .editor-card-form textarea::placeholder { color: rgba(255,255,255,0.4); }
.editor-opt-row { display: flex; gap: 6px; align-items: center; }
.editor-opt-row input { flex: 1; }
.editor-opt-row .opt-correct { flex-shrink: 0; }
.editor-opt-row .opt-remove { background: none; border: none; color: #ff8888; cursor: pointer; font-size: 1.1em; padding: 0 4px; }
.editor-btn-sm { padding: 6px 14px; border: 1px solid rgba(255,255,255,0.25); border-radius: 8px; background: rgba(255,255,255,0.08); color: #fff; font-size: 0.85em; cursor: pointer; }
.editor-btn-sm:hover { background: rgba(255,255,255,0.18); }
.editor-btn-save { background: #4caf50; border: none; color: #fff; padding: 8px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 0.95em; }
.editor-btn-cancel { background: rgba(255,255,255,0.12); border: none; color: #fff; padding: 8px 20px; border-radius: 8px; cursor: pointer; font-size: 0.95em; }
.lobby-qr { width: 140px; height: 140px; background: #fff; padding: 8px; border-radius: 12px; margin: 4px 0; }
.lobby-qr img { width: 100%; height: 100%; }
.copy-btn { background: none; border: 1px solid rgba(255,255,255,0.3); color: #fff; border-radius: 8px; padding: 4px 12px; font-size: 0.8em; cursor: pointer; }
.copy-btn:hover { background: rgba(255,255,255,0.15); }
.player-chip.disconnected { opacity: 0.4; }
.player-chip .disc-label { margin-left: auto; font-size: 0.75em; opacity: 0.6; }
.round-name-progress { font-size: 0.9em; font-weight: 600; }
</style>
</head>
<body>
<div id="app">

  <!-- Host: enter nickname -->
  <div id="screen-host-nickname" class="screen active">
    <h1>BdTrivia</h1>
    <p>Создайте викторину для друзей</p>
    <input type="text" id="host-nickname-input" placeholder="Ваше имя" maxlength="20" autocomplete="off">
    <button class="btn btn-primary" id="host-create-btn">Создать комнату</button>
    <div id="host-create-error" class="error hidden"></div>
  </div>

  <!-- Host: lobby -->
  <div id="screen-lobby-host" class="screen">
    <h2>Комната создана!</h2>
    <div class="room-code" id="room-code-display">----</div>
    <div class="lobby-qr" id="lobby-qr"></div>
    <p>Введите код на телефоне <button class="copy-btn" id="copy-code-btn">📋 Копировать</button></p>
    <div id="player-list"><p class="waiting">Ожидаем игроков...</p></div>
    <button class="btn btn-primary" id="host-start-btn" style="margin-top:8px" disabled>Начать игру</button>
    <button class="btn btn-secondary" id="host-edit-btn" style="margin-top:4px;">Редактировать вопросы</button>
    <div id="host-start-error" class="error hidden"></div>
  </div>

  <!-- Host: question editor -->
  <div id="screen-editor" class="screen">
    <h2>Редактор вопросов</h2>
    <div id="editor-list"></div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center;width:100%;max-width:360px;">
      <button class="editor-btn-sm" id="editor-add-choice">+ Вопрос (выбор)</button>
      <button class="editor-btn-sm" id="editor-add-text">+ Вопрос (текст)</button>
      <button class="editor-btn-sm" id="editor-add-slide">+ Слайд</button>
    </div>
    <div id="editor-error" class="error hidden"></div>
    <button class="btn btn-secondary" id="editor-back-btn" style="margin-top:8px;">← Назад в лобби</button>
  </div>

  <!-- Host: game in progress (question display) -->
  <div id="screen-game-host" class="screen">
    <div class="round-label" id="game-host-round"></div>
    <div class="progress-label" id="game-host-progress"></div>
    <div class="question-text" id="game-host-question"></div>
    <div class="media-container" id="game-host-media"></div>
    <div id="game-host-options"></div>
    <div class="game-bar">
      <span class="game-timer" id="game-host-timer">⏱ --:--</span>
      <span class="game-answered" id="game-host-answered"></span>
    </div>
  </div>

  <!-- Player: game in progress (question display) -->
  <div id="screen-game-player" class="screen">
    <div class="round-label" id="game-player-round"></div>
    <div class="progress-label" id="game-player-progress"></div>
    <div class="question-text" id="game-player-question"></div>
    <div class="media-container" id="game-player-media"></div>
    <div id="game-player-options"></div>
    <span class="game-timer" id="game-player-timer">⏱ --:--</span>
  </div>

  <!-- Player: enter room code -->
  <div id="screen-player-roomcode" class="screen">
    <h2>Присоединиться к игре</h2>
    <input type="text" id="player-code-input" placeholder="Код комнаты" maxlength="6" autocomplete="off">
    <button class="btn btn-primary" id="player-join-code-btn">Далее</button>
    <div id="player-code-error" class="error hidden"></div>
  </div>

  <!-- Player: enter nickname -->
  <div id="screen-player-nickname" class="screen">
    <h2>Ваше имя</h2>
    <input type="text" id="player-nickname-input" placeholder="Никнейм" maxlength="20" autocomplete="off">
    <button class="btn btn-primary" id="player-join-btn">Присоединиться</button>
    <div id="player-join-error" class="error hidden"></div>
  </div>

  <!-- Player: lobby -->
  <div id="screen-lobby-player" class="screen">
    <h2>Вы в игре!</h2>
    <p>Ожидаем, пока ведущий начнёт...</p>
    <div class="waiting" style="font-size:2em;margin-top:16px;">⏳</div>
  </div>

</div>

<script>
// ─── Firebase Config ───────────────────────────────────────────────
// Replace with your own Firebase project config:
// https://console.firebase.google.com/project/_/settings/general/
var firebaseConfig = {
  apiKey: "AIzaSyD7T0TiAh9H-03pO8jmg_HO8TDPe-fMOYM",
  authDomain: "bdtrivia-bec64.firebaseapp.com",
  databaseURL: "https://bdtrivia-bec64-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "bdtrivia-bec64",
  storageBucket: "bdtrivia-bec64.firebasestorage.app",
  messagingSenderId: "646956529243",
  appId: "1:646956529243:web:e9c00a6117151e7ce1717e"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.database();

// ─── Constants ─────────────────────────────────────────────────────
var ROOM_CODE_LENGTH = 4;
var CHARSET = 'ABCDEFGHJKMNPQRSTUVWXYZ23456789';

// ─── State ─────────────────────────────────────────────────────────
var currentRoomCode = null;
var currentPlayerId = null;

// ─── Screen Management ─────────────────────────────────────────────
function showScreen(id) {
  var screens = document.querySelectorAll('.screen');
  for (var i = 0; i < screens.length; i++) {
    screens[i].classList.remove('active');
  }
  var el = document.getElementById(id);
  if (el) el.classList.add('active');
}

function showError(el, msg) {
  el.textContent = msg;
  el.classList.remove('hidden');
}

function hideError(el) {
  el.classList.add('hidden');
}

// ─── Room Code Generation ──────────────────────────────────────────
function generateRoomCode(length) {
  var code = '';
  for (var i = 0; i < length; i++) {
    code += CHARSET.charAt(Math.floor(Math.random() * CHARSET.length));
  }
  return code;
}

function createUniqueRoomCode() {
  return new Promise(function(resolve, reject) {
    var attempts = 0;
    function tryGenerate() {
      if (attempts >= 20) {
        reject(new Error('Could not generate unique room code'));
        return;
      }
      attempts++;
      var code = generateRoomCode(ROOM_CODE_LENGTH);
      db.ref('rooms/' + code).once('value').then(function(snapshot) {
        if (!snapshot.exists()) {
          resolve(code);
        } else {
          tryGenerate();
        }
      }).catch(reject);
    }
    tryGenerate();
  });
}

// ─── Host: Create Room ─────────────────────────────────────────────
var hostNicknameInput = document.getElementById('host-nickname-input');
var hostCreateBtn = document.getElementById('host-create-btn');
var hostCreateError = document.getElementById('host-create-error');

hostCreateBtn.addEventListener('click', function() {
  var nickname = hostNicknameInput.value.trim();
  if (!nickname) {
    showError(hostCreateError, 'Введите ваше имя');
    return;
  }
  hideError(hostCreateError);
  hostCreateBtn.disabled = true;
  hostCreateBtn.textContent = 'Создаём...';

  createUniqueRoomCode().then(function(code) {
    currentRoomCode = code;
    var hostKey = Array.from(crypto.getRandomValues(new Uint8Array(6)), function(b) { return b.toString(36).padStart(2, '0'); }).join('').slice(0, 10);
    sessionStorage.setItem('bdtrivia_hostKey', hostKey);
    sessionStorage.setItem('bdtrivia_room', code);
    return db.ref('rooms/' + code).set({
      hostNickname: nickname,
      hostKey: hostKey,
      createdAt: firebase.database.ServerValue.TIMESTAMP,
      state: 'lobby'
    });
  }).then(function() {
    document.getElementById('room-code-display').textContent = currentRoomCode;
    showScreen('screen-lobby-host');
    listenPlayers(currentRoomCode);
    listenGameState(currentRoomCode, true);
    showQRCode(currentRoomCode);
  }).catch(function(err) {
    showError(hostCreateError, 'Ошибка: ' + err.message);
  }).finally(function() {
    hostCreateBtn.disabled = false;
    hostCreateBtn.textContent = 'Создать комнату';
  });
});

// ─── Lobby: Realtime Player List ───────────────────────────────────
function listenPlayers(code) {
  var ref = db.ref('rooms/' + code + '/players');
  var container = document.getElementById('player-list');

  function updatePlayerChip(key, p) {
    var chip = document.getElementById('player-' + key);
    if (chip) {
      chip.className = 'player-chip' + (p.connected === false ? ' disconnected' : '');
      chip.innerHTML = escapeHtml(p.nickname) + (p.connected === false ? '<span class="disc-label">отключился</span>' : '');
    }
  }

  ref.on('child_added', function(snapshot) {
    var p = snapshot.val();
    var placeholder = container.querySelector('.waiting');
    if (placeholder) placeholder.remove();

    var existing = document.getElementById('player-' + snapshot.key);
    if (!existing) {
      var chip = document.createElement('div');
      chip.className = 'player-chip';
      chip.id = 'player-' + snapshot.key;
      container.appendChild(chip);
    }
    updatePlayerChip(snapshot.key, p);
    updateStartButton();
  });

  ref.on('child_changed', function(snapshot) {
    updatePlayerChip(snapshot.key, snapshot.val());
  });

  ref.on('child_removed', function(snapshot) {
    var chip = document.getElementById('player-' + snapshot.key);
    if (chip) chip.remove();
    if (container.children.length === 0) {
      var p = document.createElement('p');
      p.className = 'waiting';
      p.textContent = 'Ожидаем игроков...';
      container.appendChild(p);
    }
    updateStartButton();
  });
}

// ─── QR Code + Copy ────────────────────────────────────────────────
function showQRCode(code) {
  var base = window.location.origin + window.location.pathname.replace(/\/?$/, '');
  var url = base + '?room=' + code;
  var qrContainer = document.getElementById('lobby-qr');
  qrContainer.innerHTML = '<img src="https://chart.googleapis.com/chart?cht=qr&chs=280x280&chl=' + encodeURIComponent(url) + '&chld=L|0" alt="QR">';
}

document.getElementById('copy-code-btn').addEventListener('click', function() {
  var code = document.getElementById('room-code-display').textContent;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(code).then(function() {
      document.getElementById('copy-code-btn').textContent = '✅ Скопировано';
      setTimeout(function() { document.getElementById('copy-code-btn').textContent = '📋 Копировать'; }, 2000);
    });
  }
});

// ─── Host: Edit Questions Button ────────────────────────────────────
document.getElementById('host-edit-btn').addEventListener('click', function() {
  loadDraft();
  renderEditorItems();
  showScreen('screen-editor');
});

// Enable start button only when players are connected
function updateStartButton() {
  var btn = document.getElementById('host-start-btn');
  if (btn) {
    var count = document.querySelectorAll('#player-list .player-chip').length;
    btn.disabled = count === 0;
  }
}

// ─── Host: Start Game ──────────────────────────────────────────────
var hostStartBtn = document.getElementById('host-start-btn');
var hostStartError = document.getElementById('host-start-error');

hostStartBtn.addEventListener('click', function() {
  hideError(hostStartError);
  hostStartBtn.disabled = true;
  hostStartBtn.textContent = 'Запускаем...';

  var storedKey = sessionStorage.getItem('bdtrivia_hostKey');
  if (!storedKey) {
    showError(hostStartError, 'Не удалось подтвердить права ведущего. Обновите страницу.');
    hostStartBtn.disabled = false;
    hostStartBtn.textContent = 'Начать игру';
    return;
  }

  db.ref('rooms/' + currentRoomCode + '/hostKey').once('value').then(function(snap) {
    if (snap.val() !== storedKey) {
      throw new Error('Только ведущий может запустить игру');
    }
    var startItems = getGameItems();
    var gameData = { items: startItems };
    gameData.state = 'playing';
    gameData.currentItem = 0;
    var firstItem = startItems[0];
    gameData.timerEndsAt = firstItem && firstItem.type === 'question'
      ? Date.now() + (firstItem.timeLimit || 20) * 1000
      : null;
    return db.ref('rooms/' + currentRoomCode).update(gameData);
  }).catch(function(err) {
    showError(hostStartError, 'Ошибка: ' + err.message);
    hostStartBtn.disabled = false;
    hostStartBtn.textContent = 'Начать игру';
  });
});

// ─── Get Game Items (draft if available, else sample) ────────────────
function getGameItems() {
  var saved = localStorage.getItem('bdtrivia_draft');
  if (saved) {
    try {
      var items = JSON.parse(saved);
      if (items.length > 0) return items;
    } catch(e) {}
  }
  return getSampleItems();
}

function getSampleItems() {
  return [

// ─── Game State ─────────────────────────────────────────────────────
var gameItems = null;
var gameItemCount = 0;
var gameStateCurrentItem = 0;
var timerInterval = null;
var answerCountRef = null;

// ─── Game State Listener ────────────────────────────────────────────
function listenGameState(code, isHost) {
  var roomRef = db.ref('rooms/' + code);

  roomRef.child('state').on('value', function(snapshot) {
    var state = snapshot.val();
    if (state === 'playing') {
      roomRef.once('value', function(snap) {
        var room = snap.val();
        gameItems = room.items || [];
        gameItemCount = gameItems.length;
        gameStateCurrentItem = room.currentItem;
        showScreen(isHost ? 'screen-game-host' : 'screen-game-player');
        renderCurrentItem(code, isHost, room.currentItem, room.timerEndsAt);
      });
    } else if (state === 'reveal') {
      showScreen(isHost ? 'screen-game-host' : 'screen-game-player');
      showReveal(code, isHost);
    } else if (state === 'finished') {
      showScreen(isHost ? 'screen-game-host' : 'screen-game-player');
      showFinished(code, isHost);
    }
  });

  roomRef.child('currentItem').on('value', function(snapshot) {
    var idx = snapshot.val();
    if (idx !== null && gameItems) {
      gameStateCurrentItem = idx;
      roomRef.child('timerEndsAt').once('value', function(timerSnap) {
        renderCurrentItem(code, isHost, idx, timerSnap.val());
      });
    }
  });
}

// ─── Render Current Item ────────────────────────────────────────────
function renderCurrentItem(code, isHost, itemIndex, timerEndsAt) {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  if (answerCountRef) { answerCountRef.off(); answerCountRef = null; }

  var item = gameItems[itemIndex];
  if (!item) return;

  var prefix = isHost ? 'host' : 'player';
  var isSlide = item.type === 'slide';

  if (isSlide) {
    document.getElementById('game-' + prefix + '-round').textContent = item.title || '';
    document.getElementById('game-' + prefix + '-progress').textContent = 'Слайд ' + (itemIndex + 1) + ' / ' + gameItemCount;
    document.getElementById('game-' + prefix + '-question').textContent = item.description || '';
  } else {
    var rn = item.roundName || '';
    document.getElementById('game-' + prefix + '-round').textContent = rn;
    document.getElementById('game-' + prefix + '-progress').textContent = (rn ? rn + ' · ' : '') + 'Вопрос ' + (itemIndex + 1) + ' / ' + gameItemCount;
    document.getElementById('game-' + prefix + '-question').textContent = item.question;
  }

  renderMedia(item.media, 'game-' + prefix + '-media');

  var optsContainer = document.getElementById('game-' + prefix + '-options');
  optsContainer.innerHTML = '';

  if (isSlide) {
    if (isHost) {
      var nextBtn = document.createElement('button');
      nextBtn.className = 'btn btn-primary';
      nextBtn.textContent = 'Далее →';
      nextBtn.addEventListener('click', function() {
        advanceNext(code);
      });
      optsContainer.appendChild(nextBtn);
    }
  } else if (item.questionType === 'choice' && item.options) {
    item.options.forEach(function(opt) {
      var btn = document.createElement('button');
      btn.className = 'opt-btn';
      btn.textContent = opt;
      if (!isHost) {
        btn.addEventListener('click', function() {
          selectAnswer(code, itemIndex, opt);
        });
      }
      optsContainer.appendChild(btn);
    });
  } else if (item.questionType === 'text') {
    if (!isHost) {
      var area = document.createElement('div');
      area.className = 'text-answer-area';
      var input = document.createElement('input');
      input.type = 'text';
      input.className = 'text-answer-input';
      input.placeholder = 'Ваш ответ...';
      input.maxLength = 100;
      input.autocomplete = 'off';
      var submitBtn = document.createElement('button');
      submitBtn.className = 'btn btn-primary';
      submitBtn.textContent = 'Ответить';
      submitBtn.addEventListener('click', function() {
        selectAnswer(code, itemIndex, input.value.trim());
        submitBtn.disabled = true;
        submitBtn.textContent = 'Отправлено';
      });
      area.appendChild(input);
      area.appendChild(submitBtn);
      optsContainer.appendChild(area);
    }
  }

  // Timer (not for slides)
  if (!isSlide && timerEndsAt) {
    var timerEl = document.getElementById('game-' + prefix + '-timer');
    if (isHost) {
      startTimer(timerEndsAt, timerEl, function() {
        computeScores(code, itemIndex).then(function() {
          db.ref('rooms/' + code).update({ state: 'reveal' });
        });
      });
    } else {
      startTimer(timerEndsAt, timerEl);
    }
    timerEl.style.display = '';
  } else if (isSlide) {
    document.getElementById('game-' + prefix + '-timer').style.display = 'none';
  }

  // Host: answer count (not for slides)
  if (isHost && !isSlide) {
    listenAnswerCount(code, itemIndex);
  } else if (isHost) {
    document.getElementById('game-host-answered').textContent = '';
  }
}

// ─── Host: Advance to Next Item ─────────────────────────────────────
function advanceNext(code) {
  var newIdx = (gameStateCurrentItem || 0) + 1;
  var nextItem = gameItems[newIdx];
  if (!nextItem) {
    db.ref('rooms/' + code).update({ state: 'finished' });
    return;
  }

  var update = { currentItem: newIdx, state: 'playing' };
  if (nextItem.type === 'question') {
    update.timerEndsAt = Date.now() + (nextItem.timeLimit || 20) * 1000;
  } else {
    update.timerEndsAt = null;
  }
  db.ref('rooms/' + code).update(update);
}

// ─── Game Finished ──────────────────────────────────────────────────
function showFinished(code, isHost) {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  if (answerCountRef) { answerCountRef.off(); answerCountRef = null; }

  var prefix = isHost ? 'host' : 'player';
  document.getElementById('game-' + prefix + '-timer').style.display = 'none';
  if (isHost) document.getElementById('game-host-answered').textContent = '';
  document.getElementById('game-' + prefix + '-round').textContent = '';
  document.getElementById('game-' + prefix + '-progress').textContent = 'Игра завершена!';
  document.getElementById('game-' + prefix + '-question').textContent = '';

  db.ref('rooms/' + code + '/players').once('value', function(snap) {
    var players = snap.val() || {};
    var sorted = Object.keys(players)
      .map(function(id) { return { id: id, nickname: players[id].nickname, score: players[id].score || 0 }; })
      .sort(function(a, b) { return b.score - a.score; });

    var opts = document.getElementById('game-' + prefix + '-options');
    opts.innerHTML = '';

    // Podium (top 3)
    if (sorted.length > 0) {
      var podium = document.createElement('div');
      podium.className = 'podium';

      var podiumOrder = sorted.length >= 3 ? [1, 0, 2] : (sorted.length === 2 ? [1, 0] : [0]);
      podiumOrder.forEach(function(pi) {
        var p = sorted[pi];
        if (!p) return;
        var item = document.createElement('div');
        var cls = pi === 0 ? 'podium-1' : (pi === 1 ? 'podium-2' : 'podium-3');
        item.className = 'podium-item ' + cls;
        var medals = { 0: '🥇', 1: '🥈', 2: '🥉' };
        item.innerHTML =
          '<div class="podium-medal">' + (medals[pi] || '') + '</div>' +
          '<div class="podium-name">' + escapeHtml(p.nickname) + '</div>' +
          '<div class="podium-score">' + p.score + '</div>';
        podium.appendChild(item);
      });
      opts.appendChild(podium);
    }

    // Full table
    var table = document.createElement('div');
    table.className = 'rank-table';
    sorted.forEach(function(p, i) {
      var row = document.createElement('div');
      var cls = i === 0 ? 'top1' : (i === 1 ? 'top2' : (i === 2 ? 'top3' : ''));
      row.className = 'rank-row ' + cls;
      row.innerHTML =
        '<span class="rank-pos">' + (i + 1) + '</span>' +
        '<span class="rank-name">' + escapeHtml(p.nickname) + '</span>' +
        '<span class="rank-score">' + p.score + '</span>';
      table.appendChild(row);
    });
    opts.appendChild(table);

    // New game button (host only)
    if (isHost) {
      var newBtn = document.createElement('button');
      newBtn.className = 'btn btn-primary';
      newBtn.textContent = 'Новая игра';
      newBtn.addEventListener('click', function() {
        db.ref('rooms/' + code).remove().then(function() {
          sessionStorage.clear();
          window.location.href = window.location.pathname;
        });
      });
      opts.appendChild(newBtn);
    }
  });
}

// ─── Media Renderer ─────────────────────────────────────────────────
function renderMedia(media, containerId) {
  var container = document.getElementById(containerId);
  container.innerHTML = '';
  if (!media || !media.url) return;
  if (media.type === 'youtube') {
    var iframe = document.createElement('iframe');
    iframe.src = media.url;
    iframe.allowFullscreen = true;
    container.appendChild(iframe);
  } else if (media.type === 'image') {
    var img = document.createElement('img');
    img.src = media.url;
    img.alt = '';
    container.appendChild(img);
  } else if (media.type === 'audio') {
    var audio = document.createElement('audio');
    audio.src = media.url;
    audio.controls = true;
    container.appendChild(audio);
  }
}

// ─── Timer ──────────────────────────────────────────────────────────
function startTimer(endsAt, displayEl, onExpire) {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  function tick() {
    var remaining = Math.max(0, Math.floor((endsAt - Date.now()) / 1000));
    var min = Math.floor(remaining / 60);
    var sec = remaining % 60;
    displayEl.textContent = '⏱ ' + min + ':' + (sec < 10 ? '0' : '') + sec;
    if (remaining <= 0) {
      clearInterval(timerInterval);
      timerInterval = null;
      if (onExpire) onExpire();
    }
  }
  tick();
  timerInterval = setInterval(tick, 1000);
}

// ─── Host: Compute Scores ───────────────────────────────────────────
function computeScores(code, itemIndex) {
  var item = gameItems[itemIndex];
  if (!item || item.type !== 'question') return Promise.resolve();

  var timeLimitMs = (item.timeLimit || 20) * 1000;
  var correctAnswers = Array.isArray(item.correctAnswer)
    ? item.correctAnswer.map(function(ca) { return ca.toLowerCase(); })
    : [item.correctAnswer.toLowerCase()];

  return db.ref('rooms/' + code).once('value').then(function(snap) {
    var room = snap.val();
    var answers = (room.answers && room.answers[itemIndex]) || {};
    var players = room.players || {};
    var questionStartedAt = (room.timerEndsAt || 0) - timeLimitMs;

    var updates = {};
    Object.keys(answers).forEach(function(playerId) {
      var a = answers[playerId];
      var isCorrect = correctAnswers.indexOf((a.answer || '').toLowerCase()) !== -1;

      var points = 0;
      if (isCorrect && a.answeredAt) {
        var elapsed = a.answeredAt - questionStartedAt;
        var ratio = elapsed / timeLimitMs;
        points = Math.round(item.maxScore * Math.max(0, 1 - ratio * 0.85));
      }

      updates['answers/' + itemIndex + '/' + playerId + '/correct'] = isCorrect;
      updates['answers/' + itemIndex + '/' + playerId + '/points'] = points;
      updates['players/' + playerId + '/score'] = ((players[playerId] && players[playerId].score) || 0) + points;
    });

    return Object.keys(updates).length > 0 ? db.ref('rooms/' + code).update(updates) : Promise.resolve();
  });
}

// ─── Reveal Results ──────────────────────────────────────────────────
function showReveal(code, isHost) {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  if (answerCountRef) { answerCountRef.off(); answerCountRef = null; }

  var item = gameItems[gameStateCurrentItem];
  if (!item) return;

  var prefix = isHost ? 'host' : 'player';
  var correctLabel = Array.isArray(item.correctAnswer) ? item.correctAnswer[0] : item.correctAnswer;

  // Hide timer
  document.getElementById('game-' + prefix + '-timer').style.display = 'none';
  if (isHost) document.getElementById('game-host-answered').textContent = '';

  db.ref('rooms/' + code).once('value').then(function(snap) {
    var room = snap.val();
    var answers = (room.answers && room.answers[gameStateCurrentItem]) || {};
    var players = room.players || {};

    if (isHost) {
      renderHostReveal(prefix, item, answers, players, correctLabel, code);
    } else {
      renderPlayerReveal(prefix, item, answers, players, correctLabel);
    }
  });
}

function renderHostReveal(prefix, item, answers, players, correctLabel, code) {
  var opts = document.getElementById('game-' + prefix + '-options');
  opts.innerHTML = '';

  var totalPlayers = Object.keys(players).length;
  var answeredCount = Object.keys(answers).length;

  // Correct answer header
  var answerHeader = document.createElement('div');
  answerHeader.className = 'reveal-header';
  answerHeader.textContent = 'Правильный ответ: ' + correctLabel;
  opts.appendChild(answerHeader);

  // Distribution for choice
  if (item.questionType === 'choice' && item.options) {
    var maxCount = 0;
    var counts = {};
    item.options.forEach(function(opt) { counts[opt] = 0; });
    Object.keys(answers).forEach(function(pid) {
      var a = answers[pid].answer;
      if (counts[a] !== undefined) counts[a]++;
    });
    maxCount = Math.max.apply(null, Object.keys(counts).map(function(k) { return counts[k]; }), 1);

    item.options.forEach(function(opt) {
      var bar = document.createElement('div');
      bar.className = 'reveal-dist-bar';
      var label = document.createElement('span');
      label.className = 'reveal-dist-label';
      label.textContent = opt;
      var fillWrap = document.createElement('div');
      fillWrap.style.cssText = 'flex:1;background:rgba(255,255,255,0.08);border-radius:6px;height:22px;';
      var fill = document.createElement('div');
      fill.className = 'reveal-dist-fill ' + (opt === correctLabel ? 'correct' : 'wrong');
      fill.style.cssText = 'width:' + Math.round(counts[opt] / maxCount * 100) + '%;display:flex;align-items:center;padding-left:6px;font-size:0.85em;white-space:nowrap;';
      fill.textContent = counts[opt] > 0 ? counts[opt] : '';
      fillWrap.appendChild(fill);
      bar.appendChild(label);
      bar.appendChild(fillWrap);
      opts.appendChild(bar);
    });
  } else if (item.questionType === 'text') {
    var correctCount = 0;
    Object.keys(answers).forEach(function(pid) {
      if (answers[pid].correct) correctCount++;
    });
    var pct = answeredCount > 0 ? Math.round(correctCount / answeredCount * 100) : 0;
    var info = document.createElement('p');
    info.style.cssText = 'width:100%;max-width:320px;text-align:left;margin:4px 0;font-size:0.95em;';
    info.textContent = 'Правильно: ' + correctCount + ' из ' + answeredCount + ' (' + pct + '%)';
    opts.appendChild(info);
  }

  // Summary line
  var summary = document.createElement('p');
  summary.style.cssText = 'width:100%;max-width:320px;text-align:left;margin:8px 0 4px;font-size:0.9em;opacity:0.8;';
  summary.textContent = 'Ответило: ' + answeredCount + ' / ' + totalPlayers;
  opts.appendChild(summary);

  // Top-3
  renderTop3(opts, players);

  // Next button
  var nextBtn = document.createElement('button');
  nextBtn.className = 'btn btn-primary';
  nextBtn.textContent = 'Далее →';
  nextBtn.addEventListener('click', function() {
    advanceNext(code);
  });
  opts.appendChild(nextBtn);
}

function renderPlayerReveal(prefix, item, answers, players, correctLabel) {
  var opts = document.getElementById('game-' + prefix + '-options');
  opts.innerHTML = '';

  var myAnswerData = answers[currentPlayerId];
  var myAnswer = myAnswerData ? myAnswerData.answer : '—';
  var points = myAnswerData ? myAnswerData.points : 0;
  var isCorrect = myAnswerData ? myAnswerData.correct : false;

  // My answer row
  var myRow = document.createElement('div');
  myRow.className = 'reveal-row ' + (isCorrect ? 'correct' : 'wrong');
  myRow.innerHTML = '<span>Ваш ответ: <strong>' + escapeHtml(myAnswer) + '</strong></span><span>' + (isCorrect ? '✅' : '❌') + '</span>';
  opts.appendChild(myRow);

  // Correct answer row
  var correctRow = document.createElement('div');
  correctRow.className = 'reveal-row correct';
  correctRow.innerHTML = '<span>Правильный: <strong>' + escapeHtml(correctLabel) + '</strong></span>';
  opts.appendChild(correctRow);

  // Points
  var ptsEl = document.createElement('div');
  ptsEl.style.cssText = 'font-size:1.1em;font-weight:700;margin:8px 0;width:100%;max-width:320px;text-align:left;';
  ptsEl.textContent = (isCorrect ? '+' : '') + points + ' баллов';
  opts.appendChild(ptsEl);

  // Top-3
  renderTop3(opts, players);
}

function renderTop3(container, players) {
  var sorted = Object.keys(players)
    .map(function(id) { return { id: id, nickname: players[id].nickname, score: players[id].score || 0 }; })
    .sort(function(a, b) { return b.score - a.score; })
    .slice(0, 3);

  if (sorted.length === 0) return;

  var header = document.createElement('div');
  header.className = 'reveal-header';
  header.textContent = 'Топ-3';
  container.appendChild(header);

  sorted.forEach(function(p, i) {
    var row = document.createElement('div');
    row.className = 'reveal-top3-item';
    row.innerHTML = '<span>' + (i + 1) + '. ' + escapeHtml(p.nickname) + '</span><span>' + p.score + '</span>';
    container.appendChild(row);
  });
}

function escapeHtml(str) {
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(str || ''));
  return div.innerHTML;
}

// ─── Question Editor ────────────────────────────────────────────────
var draftItems = [];
var editorExpandedIdx = -1;

function loadDraft() {
  var saved = localStorage.getItem('bdtrivia_draft');
  if (saved) {
    try { draftItems = JSON.parse(saved); return; } catch(e) {}
  }
  // Fall back to sample data
  draftItems = JSON.parse(JSON.stringify(getSampleItems()));
}

function saveDraft() {
  localStorage.setItem('bdtrivia_draft', JSON.stringify(draftItems));
}

function renderEditorItems() {
  var list = document.getElementById('editor-list');
  list.innerHTML = '';
  if (draftItems.length === 0) {
    list.innerHTML = '<p class="waiting" style="margin:16px 0;">Нет вопросов. Добавьте первый!</p>';
    return;
  }
  draftItems.forEach(function(item, i) {
    var isExpanded = editorExpandedIdx === i;
    var card = document.createElement('div');
    card.className = 'editor-card';

    // Summary
    var summary = document.createElement('div');
    summary.className = 'editor-card-summary';
    var icon = item.type === 'slide' ? '📄' : (item.questionType === 'text' ? '✏️' : '📝');
    var preview = item.type === 'slide' ? (item.title || 'Слайд') : (item.question || 'Вопрос');
    summary.innerHTML =
      '<span class="editor-card-icon">' + icon + '</span>' +
      '<span class="editor-card-preview">' + escapeHtml(preview) + '</span>' +
      '<span class="editor-card-actions">' +
        '<button data-action="move-up" data-i="' + i + '" ' + (i === 0 ? 'disabled style="opacity:0.3"' : '') + '>↑</button>' +
        '<button data-action="move-down" data-i="' + i + '" ' + (i === draftItems.length - 1 ? 'disabled style="opacity:0.3"' : '') + '>↓</button>' +
        '<button data-action="delete" data-i="' + i + '" style="color:#ff8888;">✕</button>' +
      '</span>';
    summary.addEventListener('click', function(e) {
      if (e.target.closest('.editor-card-actions')) return;
      editorExpandedIdx = editorExpandedIdx === i ? -1 : i;
      renderEditorItems();
    });
    card.appendChild(summary);

    // Edit form
    var form = document.createElement('div');
    form.className = 'editor-card-form' + (isExpanded ? ' open' : '');
    form.dataset.index = i;
    if (isExpanded) {
      buildEditorForm(form, item, i);
    }
    card.appendChild(form);
    list.appendChild(card);
  });
}

function buildEditorForm(form, item, index) {
  if (item.type === 'slide') {
    form.innerHTML =
      '<label>Заголовок</label><input class="f-title" value="' + escapeHtml(item.title || '') + '" placeholder="Раунд 1: История">' +
      '<label>Описание</label><textarea class="f-desc" placeholder="Правила раунда">' + escapeHtml(item.description || '') + '</textarea>';
  } else {
    var typeLabel = item.questionType === 'text' ? 'Свободный текст' : 'Выбор одного';
    form.innerHTML =
      '<label>Вопрос</label><textarea class="f-question" placeholder="Текст вопроса">' + escapeHtml(item.question || '') + '</textarea>' +
      '<label>Раунд</label><input class="f-round" value="' + escapeHtml(item.roundName || '') + '" placeholder="Название раунда">' +
      '<div style="display:flex;gap:8px;">' +
        '<div style="flex:1;"><label>Лимит (сек)</label><input class="f-timelimit" type="number" value="' + (item.timeLimit || 20) + '" min="5" max="120" step="5"></div>' +
        '<div style="flex:1;"><label>MAX баллов</label><input class="f-maxscore" type="number" value="' + (item.maxScore || 1000) + '" min="100" max="10000" step="100"></div>' +
      '</div>';

    if (item.questionType === 'choice') {
      var optsHtml = '<label>Варианты ответов</label>';
      (item.options || ['', '', '', '']).forEach(function(opt, oi) {
        optsHtml +=
          '<div class="editor-opt-row">' +
            '<input class="f-opt" value="' + escapeHtml(opt) + '" placeholder="Вариант ' + (oi + 1) + '">' +
            '<input class="opt-correct" type="radio" name="correct-' + index + '" value="' + oi + '" ' + (item.correctAnswer === opt ? 'checked' : '') + '>' +
            (item.options.length > 2 ? '<button class="opt-remove" data-oi="' + oi + '">×</button>' : '') +
          '</div>';
      });
      optsHtml += '<button class="editor-btn-sm" id="add-opt-' + index + '" ' + (item.options.length >= 6 ? 'disabled style="opacity:0.4"' : '') + '>+ Вариант</button>';
      form.innerHTML += optsHtml;
      form.querySelector('.f-question').dataset.type = 'choice';
    } else {
      var correctVal = Array.isArray(item.correctAnswer) ? item.correctAnswer.join(', ') : (item.correctAnswer || '');
      form.innerHTML +=
        '<label>Правильный ответ (синонимы через запятую)</label><input class="f-correct-text" value="' + escapeHtml(correctVal) + '" placeholder="Канберра, Canberra">';
    }
  }

  // Media
  var media = item.media || {};
  form.innerHTML +=
    '<label>Медиа (необязательно)</label>' +
    '<div style="display:flex;gap:6px;">' +
      '<select class="f-media-type" style="flex:0 0 auto;width:auto;padding:8px;border:none;border-radius:8px;background:rgba(255,255,255,0.12);color:#fff;">' +
        '<option value="">Нет</option>' +
        '<option value="youtube" ' + (media.type === 'youtube' ? 'selected' : '') + '>YouTube</option>' +
        '<option value="image" ' + (media.type === 'image' ? 'selected' : '') + '>Картинка</option>' +
        '<option value="audio" ' + (media.type === 'audio' ? 'selected' : '') + '>Аудио</option>' +
      '</select>' +
      '<input class="f-media-url" style="flex:1;" value="' + escapeHtml(media.url || '') + '" placeholder="URL медиа">' +
    '</div>';

  // Buttons
  form.innerHTML +=
    '<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:4px;">' +
      '<button class="editor-btn-cancel" data-action="cancel">Отмена</button>' +
      '<button class="editor-btn-save" data-action="save">Сохранить</button>' +
    '</div>';

  // Event delegation for save/cancel
  form.addEventListener('click', function(e) {
    var action = e.target.dataset.action;
    if (action === 'cancel') {
      editorExpandedIdx = -1;
      renderEditorItems();
    } else if (action === 'save') {
      saveEditorItem(index);
    } else if (e.target.classList.contains('opt-remove')) {
      var oi = parseInt(e.target.dataset.oi);
      if (draftItems[index].options.length > 2) {
        draftItems[index].options.splice(oi, 1);
        if (draftItems[index].correctAnswer === draftItems[index].options[oi]) {
          draftItems[index].correctAnswer = draftItems[index].options[0] || '';
        }
        renderEditorItems();
        setExpanded(index);
      }
    }
  });

  // Add option button
  var addOptBtn = form.querySelector('#add-opt-' + index);
  if (addOptBtn) {
    addOptBtn.addEventListener('click', function() {
      if (draftItems[index].options.length < 6) {
        draftItems[index].options.push('');
        renderEditorItems();
        setExpanded(index);
      }
    });
  }
}

function setExpanded(idx) {
  editorExpandedIdx = idx;
}

function saveEditorItem(index) {
  var form = document.querySelector('.editor-card-form.open');
  if (!form) return;

  var item = draftItems[index];
  if (item.type === 'slide') {
    item.title = form.querySelector('.f-title').value.trim();
    item.description = form.querySelector('.f-desc').value.trim();
    if (!item.title) { showError(document.getElementById('editor-error'), 'Заголовок слайда обязателен'); return; }
  } else {
    item.question = form.querySelector('.f-question').value.trim();
    item.roundName = form.querySelector('.f-round').value.trim();
    item.timeLimit = parseInt(form.querySelector('.f-timelimit').value) || 20;
    item.maxScore = parseInt(form.querySelector('.f-maxscore').value) || 1000;

    if (!item.question) { showError(document.getElementById('editor-error'), 'Вопрос не может быть пустым'); return; }

    if (item.questionType === 'choice') {
      var optInputs = form.querySelectorAll('.f-opt');
      var opts = [];
      optInputs.forEach(function(inp) { if (inp.value.trim()) opts.push(inp.value.trim()); });
      if (opts.length < 2) { showError(document.getElementById('editor-error'), 'Нужно минимум 2 варианта ответа'); return; }
      item.options = opts;
      var correctRadio = form.querySelector('input[name="correct-' + index + '"]:checked');
      if (!correctRadio) { showError(document.getElementById('editor-error'), 'Выберите правильный ответ'); return; }
      item.correctAnswer = opts[parseInt(correctRadio.value)];
    } else {
      var raw = form.querySelector('.f-correct-text').value || '';
      var syns = raw.split(',').map(function(s) { return s.trim(); }).filter(function(s) { return s; });
      if (syns.length === 0) { showError(document.getElementById('editor-error'), 'Укажите хотя бы один правильный ответ'); return; }
      item.correctAnswer = syns;
    }

    // Media
    var mediaType = form.querySelector('.f-media-type').value;
    var mediaUrl = form.querySelector('.f-media-url').value.trim();
    item.media = mediaUrl ? { type: mediaType, url: mediaUrl } : null;
  }

  hideError(document.getElementById('editor-error'));
  editorExpandedIdx = -1;
  saveDraft();
  renderEditorItems();
}

function deleteItem(index) {
  if (!confirm('Удалить этот элемент?')) return;
  draftItems.splice(index, 1);
  if (editorExpandedIdx === index) editorExpandedIdx = -1;
  else if (editorExpandedIdx > index) editorExpandedIdx--;
  saveDraft();
  renderEditorItems();
}

function moveItem(index, direction) {
  var newIdx = index + direction;
  if (newIdx < 0 || newIdx >= draftItems.length) return;
  var tmp = draftItems[index];
  draftItems[index] = draftItems[newIdx];
  draftItems[newIdx] = tmp;
  if (editorExpandedIdx === index) editorExpandedIdx = newIdx;
  else if (editorExpandedIdx === newIdx) editorExpandedIdx = index;
  saveDraft();
  renderEditorItems();
}

// Editor event delegation
document.getElementById('editor-list').addEventListener('click', function(e) {
  var btn = e.target.closest('[data-action]');
  if (!btn) return;
  var i = parseInt(btn.dataset.i);
  var action = btn.dataset.action;
  if (action === 'delete') deleteItem(i);
  else if (action === 'move-up') moveItem(i, -1);
  else if (action === 'move-down') moveItem(i, 1);
});

document.getElementById('editor-add-choice').addEventListener('click', function() {
  draftItems.push({ type: 'question', questionType: 'choice', question: '', media: null, options: ['', ''], correctAnswer: '', maxScore: 1000, timeLimit: 20, roundName: '' });
  editorExpandedIdx = draftItems.length - 1;
  saveDraft();
  renderEditorItems();
});

document.getElementById('editor-add-text').addEventListener('click', function() {
  draftItems.push({ type: 'question', questionType: 'text', question: '', media: null, correctAnswer: [''], maxScore: 1000, timeLimit: 20, roundName: '' });
  editorExpandedIdx = draftItems.length - 1;
  saveDraft();
  renderEditorItems();
});

document.getElementById('editor-add-slide').addEventListener('click', function() {
  draftItems.push({ type: 'slide', title: '', description: '' });
  editorExpandedIdx = draftItems.length - 1;
  saveDraft();
  renderEditorItems();
});

document.getElementById('editor-back-btn').addEventListener('click', function() {
  hideError(document.getElementById('editor-error'));
  showScreen('screen-lobby-host');
});

// ─── Player: Select Answer ──────────────────────────────────────────
function selectAnswer(code, itemIndex, answer) {
  if (!currentPlayerId || !answer) return;

  // Check if already answered
  var answerRef = db.ref('rooms/' + code + '/answers/' + itemIndex + '/' + currentPlayerId);
  answerRef.once('value').then(function(snap) {
    if (snap.exists()) return; // already answered

    answerRef.set({
      answer: answer,
      answeredAt: firebase.database.ServerValue.TIMESTAMP
    }).then(function() {
      showAnswerWaiting(code, itemIndex);
    });
  });
}

// ─── Player: Show Waiting State ──────────────────────────────────────
function showAnswerWaiting(code, itemIndex) {
  var container = document.getElementById('game-player-options');
  container.innerHTML = '<p style="font-size:1.1em;opacity:0.9;">Ответ принят!</p><p class="waiting" style="margin-top:4px;">Ждём остальных...</p>';
  // Disable any active inputs/buttons
  var inputs = container.querySelectorAll('input, button');
  inputs.forEach(function(el) { el.disabled = true; });
}

// ─── Host: Answer Count ─────────────────────────────────────────────
function listenAnswerCount(code, itemIndex) {
  var ref = db.ref('rooms/' + code + '/answers/' + itemIndex);
  answerCountRef = ref;
  ref.on('value', function(snapshot) {
    var count = snapshot.exists() ? Object.keys(snapshot.val()).length : 0;
    document.getElementById('game-host-answered').textContent = 'Ответило: ' + count;
  });
}

// ─── Player: Room Code Entry ───────────────────────────────────────
var playerCodeInput = document.getElementById('player-code-input');
var playerJoinCodeBtn = document.getElementById('player-join-code-btn');
var playerCodeError = document.getElementById('player-code-error');

playerCodeInput.addEventListener('input', function() {
  this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
});

playerJoinCodeBtn.addEventListener('click', function() {
  var code = playerCodeInput.value.trim();
  if (!code || code.length < 3) {
    showError(playerCodeError, 'Введите код комнаты');
    return;
  }
  hideError(playerCodeError);

  db.ref('rooms/' + code).once('value').then(function(snapshot) {
    if (!snapshot.exists()) {
      showError(playerCodeError, 'Комната не найдена');
      return;
    }
    var room = snapshot.val();
    if (room.state !== 'lobby') {
      showError(playerCodeError, 'Игра уже началась');
      return;
    }
    currentRoomCode = code;
    showScreen('screen-player-nickname');
  }).catch(function(err) {
    showError(playerCodeError, 'Ошибка: ' + err.message);
  });
});

// ─── Player: Join Room ─────────────────────────────────────────────
var playerNicknameInput = document.getElementById('player-nickname-input');
var playerJoinBtn = document.getElementById('player-join-btn');
var playerJoinError = document.getElementById('player-join-error');

playerJoinBtn.addEventListener('click', function() {
  var nickname = playerNicknameInput.value.trim();
  if (!nickname) {
    showError(playerJoinError, 'Введите никнейм');
    return;
  }
  hideError(playerJoinError);
  playerJoinBtn.disabled = true;
  playerJoinBtn.textContent = 'Присоединяюсь...';

  var playersRef = db.ref('rooms/' + currentRoomCode + '/players');
  var newRef = playersRef.push();
  newRef.set({
    nickname: nickname,
    score: 0,
    connected: true
  }).then(function() {
    currentPlayerId = newRef.key;
    sessionStorage.setItem('bdtrivia_playerId', currentPlayerId);
    sessionStorage.setItem('bdtrivia_room', currentRoomCode);
    showScreen('screen-lobby-player');
    listenGameState(currentRoomCode, false);
    playersRef.child(currentPlayerId).onDisconnect().update({ connected: false });
  }).catch(function(err) {
    showError(playerJoinError, 'Ошибка: ' + err.message);
  }).finally(function() {
    playerJoinBtn.disabled = false;
    playerJoinBtn.textContent = 'Присоединиться';
  });
});

// ─── Initial Screen / Reconnect ─────────────────────────────────────
var params = new URLSearchParams(window.location.search);
var roomFromUrl = params.get('room');

function tryReconnect() {
  var savedRoom = sessionStorage.getItem('bdtrivia_room');
  var savedPlayerId = sessionStorage.getItem('bdtrivia_playerId');
  var savedHostKey = sessionStorage.getItem('bdtrivia_hostKey');
  if (!savedRoom) return;

  currentRoomCode = savedRoom;
  db.ref('rooms/' + savedRoom).once('value').then(function(snapshot) {
    if (!snapshot.exists()) { sessionStorage.clear(); return; }
    var room = snapshot.val();

    // Host reconnect
    if (savedHostKey && room.hostKey === savedHostKey) {
      document.getElementById('room-code-display').textContent = savedRoom;
      if (room.state === 'lobby') {
        showScreen('screen-lobby-host');
        listenPlayers(savedRoom);
        listenGameState(savedRoom, true);
        return;
      }
      listenGameState(savedRoom, true);
      return;
    }

    // Player reconnect
    if (savedPlayerId && room.players && room.players[savedPlayerId]) {
      currentPlayerId = savedPlayerId;
      if (room.state === 'lobby') {
        showScreen('screen-lobby-player');
        listenGameState(savedRoom, false);
        return;
      }
      listenGameState(savedRoom, false);
      return;
    }
  });
}

if (roomFromUrl) {
  currentRoomCode = roomFromUrl.toUpperCase().replace(/[^A-Z0-9]/g, '');
  if (!currentRoomCode) { showScreen('screen-player-roomcode'); }
  else {
    db.ref('rooms/' + currentRoomCode).once('value').then(function(snapshot) {
      if (!snapshot.exists()) { showScreen('screen-player-roomcode'); }
      else {
        var room = snapshot.val();
        if (room.state !== 'lobby') {
          showError(playerCodeError, 'Игра уже началась');
          document.getElementById('player-code-input').value = currentRoomCode;
          showScreen('screen-player-roomcode');
        } else {
          showScreen('screen-player-nickname');
        }
      }
    }).catch(function(err) {
      console.error('Room lookup failed:', err);
      showScreen('screen-player-roomcode');
    });
  }
} else {
  tryReconnect();
}
</script>
